server:
  port: 8082

spring:
  application:
    name: CUSTOMER-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/banking_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"